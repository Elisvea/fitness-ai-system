<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">

    <title>
        Добавить статью | Фитнес-Помощник
    </title>

    <link rel="stylesheet" href="/static/css/styles.css?v=34">
</head>

<body>

<header class="site-header">

    <div class="logo">
        Фитнес-Помощник
    </div>

    <nav class="nav-menu">

        <a href="/articles">
            Статьи
        </a>

        <a class="logout-button" href="/logout">
            Выйти
        </a>

    </nav>

</header>

<main class="article-detail-page">

    <div class="article-detail-card">

        <span class="category">
            Админ-панель
        </span>

        <h1>
            Добавить новую статью
        </h1>

        <form
            class="admin-form"
            method="post"
            action="/admin/articles/new"
        >

            <label>
                Название статьи
            </label>

            <input
                type="text"
                name="title"
                required
            >

            <label>
                Категория
            </label>

            <select name="category" required>

                <option value="Питание">
                    Питание
                </option>

                <option value="Тренировки">
                    Тренировки
                </option>

                <option value="Набор мышечной массы">
                    Набор мышечной массы
                </option>

                <option value="Снижение веса">
                    Снижение веса
                </option>

                <option value="Здоровье">
                    Здоровье
                </option>

            </select>

            <label>
                Текст статьи
            </label>

            <textarea
                name="content"
                rows="10"
                required
            ></textarea>

            <label>
                Источник
            </label>

            <input
                type="url"
                name="source_url"
                placeholder="https://example.com"
            >

            <button
                type="submit"
                class="primary-btn"
            >
                Сохранить статью
            </button>

        </form>

    </div>

</main>

</body>
</html>
