<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Регистрация | Фитнес-Помощник</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=11">
</head>

<body>

<div class="login-container">

    <h1>Фитнес-Помощник</h1>

    <p>Создайте новый аккаунт</p>

    <form method="post" action="/register">

        <input
            type="text"
            name="username"
            placeholder="Введите логин"
            minlength="6"
            pattern="[A-Za-z0-9]+"
            title="Минимум 6 символов. Только английские буквы и цифры"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Введите email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Введите пароль"
            minlength="6"
            title="Минимум 6 символов"
            required
        >

        <button type="submit">Зарегистрироваться</button>

    </form>

    <p>
        Уже есть аккаунт?
        <a href="/">Войти</a>
    </p>

</div>

</body>
</html>
