<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Регистрация | Система поддержки здорового образа жизни</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=12">
</head>

<body>

<div class="login-container">

    <h1>Система поддержки здорового образа жизни</h1>

    <p>Создайте новый аккаунт</p>

 

    <form method="post" action="/register">

        <input
            type="text"
            name="username"
            placeholder="Введите логин"
            value="{{ username if username else '' }}"
            required
        >

        {% if username_error %}
        <div class="field-error">
            {{ username_error }}
        </div>
        {% endif %}


        <input
            type="password"
            name="password"
            placeholder="Введите пароль"
            required
        >

        {% if password_error %}
        <div class="field-error">
            {{ password_error }}
        </div>
        {% endif %}

        <button type="submit">Зарегистрироваться</button>

    </form>

    <p>
        Уже есть аккаунт?
        <a href="/">Войти</a>
    </p>

</div>

</body>
</html>
