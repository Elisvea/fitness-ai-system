<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Вход | Система поддержки здорового образа жизни</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=12">
</head>

<body>

<div class="login-container">

    <h1>Система поддержки здорового образа жизни</h1>

    <p>Войдите в систему</p>

    <form method="post" action="/login">

        <input
            type="text"
            name="username"
            placeholder="Введите логин"
            value="{{ username if username else '' }}"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Введите пароль"
            required
        >

        <button type="submit">Войти</button>

        {% if error_message %}
        <div class="error-message">
            {{ error_message }}
        </div>
        {% endif %}

    </form>

    <p>
        Нет аккаунта?
        <a href="/register">Зарегистрироваться</a>
    </p>

</div>

</body>
</html>
